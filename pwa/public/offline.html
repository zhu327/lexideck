<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
		<meta name="color-scheme" content="light" />
		<meta name="theme-color" content="#f5f5f7" />
		<title>Offline — Anki Vocab</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html {
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
			}
			body {
				background: #f5f5f7;
				color: #1d1d1f;
				font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
				font-size: 17px;
				font-weight: 400;
				line-height: 1.47;
				letter-spacing: -0.374px;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				min-height: 100dvh;
				padding: 32px 24px;
				text-align: center;
			}
			.container {
				background: #ffffff;
				border: 1px solid #e0e0e0;
				border-radius: 18px;
				padding: 40px 32px;
				max-width: 400px;
				width: 100%;
			}
			.icon {
				font-size: 40px;
				margin-bottom: 24px;
				line-height: 1;
				opacity: 0.9;
			}
			h1 {
				font-family: "SF Pro Display", system-ui, -apple-system, sans-serif;
				font-size: 28px;
				font-weight: 400;
				line-height: 1.14;
				letter-spacing: 0.196px;
				margin-bottom: 12px;
				color: #1d1d1f;
			}
			p {
				font-size: 14px;
				font-weight: 400;
				line-height: 1.43;
				letter-spacing: -0.224px;
				color: #7a7a7a;
				margin-bottom: 24px;
			}
			button {
				font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
				font-size: 17px;
				font-weight: 400;
				line-height: 1.47;
				letter-spacing: -0.374px;
				background: #0066cc;
				color: #ffffff;
				border: none;
				padding: 11px 22px;
				border-radius: 9999px;
				cursor: pointer;
				transition: background 0.15s ease, transform 0.1s ease;
			}
			button:hover {
				background: #0071e3;
			}
			button:active {
				transform: scale(0.95);
			}
			.version {
				margin-top: 24px;
				font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
				font-size: 12px;
				color: #7a7a7a;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="icon">📡</div>
			<h1>You're offline</h1>
			<p>
				Connect to the internet to continue reviewing. Your progress will sync
				automatically when you're back online.
			</p>
			<button type="button" onclick="location.reload()">Try again</button>
			<div class="version">Anki Vocab</div>
		</div>
	</body>
</html>
